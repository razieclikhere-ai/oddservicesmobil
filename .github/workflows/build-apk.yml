name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: Recreate Platform Projects
      run: |
        flutter create . --org com.smart.obd --project-name smart_obd_assistant
        rm -rf test

    - name: Patch Kotlin, AGP and Gradle wrapper versions
      run: |
        python3 -c "
        import os, re
        # 1. Patch Kotlin Android version in settings.gradle
        if os.path.exists('android/settings.gradle'):
            f=open('android/settings.gradle'); c=f.read(); f.close()
            c=re.sub(r'id\s+[\"\']org\.jetbrains\.kotlin\.android[\"\']\s+version\s+[\"\'][^\"\']+[\"\']', 'id \"org.jetbrains.kotlin.android\" version \"1.9.24\"', c)
            # 2. Patch AGP version in settings.gradle
            c=re.sub(r'id\s+[\"\']com\.android\.application[\"\']\s+version\s+[\"\'][^\"\']+[\"\']', 'id \"com.android.application\" version \"8.1.1\"', c)
            f=open('android/settings.gradle', 'w'); f.write(c); f.close()
            
        # 3. Patch kotlin_version in build.gradle
        if os.path.exists('android/build.gradle'):
            f=open('android/build.gradle'); c=f.read(); f.close()
            c=re.sub(r'ext\.kotlin_version\s*=\s*[\"\'][^\"\']+[\"\']', \"ext.kotlin_version = '1.9.24'\", c)
            f=open('android/build.gradle', 'w'); f.write(c); f.close()

        # 4. Patch Gradle wrapper version to 8.2-all
        wrapper_path = 'android/gradle/wrapper/gradle-wrapper.properties'
        if os.path.exists(wrapper_path):
            f=open(wrapper_path); c=f.read(); f.close()
            c=re.sub(r'distributionUrl=.*', 'distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-all.zip', c)
            f=open(wrapper_path, 'w'); f.write(c); f.close()
        "

    - name: Copy AndroidManifest with Bluetooth permissions
      run: cp assets/android/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

    - name: Patch android/build.gradle for legacy plugins
      run: |
        echo -e "\next.flutter = [\n    compileSdkVersion: 34,\n    minSdkVersion: 21,\n    targetSdkVersion: 34\n]" >> android/build.gradle

    - name: Patch app-level build.gradle for JVM 17
      run: |
        python3 -c "
        import os
        path = 'android/app/build.gradle'
        if os.path.exists(path):
            f=open(path); c=f.read(); f.close()
            c = c.replace('sourceCompatibility JavaVersion.VERSION_1_8', 'sourceCompatibility JavaVersion.VERSION_17')
            c = c.replace('targetCompatibility JavaVersion.VERSION_1_8', 'targetCompatibility JavaVersion.VERSION_17')
            c = c.replace(\"jvmTarget = '1.8'\", \"jvmTarget = '17'\")
            c = c.replace('jvmTarget = \"1.8\"', 'jvmTarget = \"17\"')
            f=open(path, 'w'); f.write(c); f.close()
        "

    - name: Get Dependencies
      run: flutter pub get

    - name: Generate Launcher Icons
      run: flutter pub run flutter_launcher_icons

    - name: Analyze Code
      run: flutter analyze --no-fatal-infos
      continue-on-error: true

    - name: Build APK
      run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-OBD-Assistant-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
