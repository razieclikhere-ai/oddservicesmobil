name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: Recreate Platform Projects
      run: |
        flutter create . --org com.smart.obd --project-name smart_obd_assistant
        rm -rf test

    - name: Patch Kotlin Gradle Plugin version to 2.0.21
      run: |
        python3 -c "
        import os, re
        if os.path.exists('android/settings.gradle'):
            f=open('android/settings.gradle'); c=f.read(); f.close()
            c=re.sub(r'id\s+[\"\']org\.jetbrains\.kotlin\.android[\"\']\s+version\s+[\"\'][^\"\']+[\"\']', 'id \"org.jetbrains.kotlin.android\" version \"2.0.21\"', c)
            f=open('android/settings.gradle', 'w'); f.write(c); f.close()
        if os.path.exists('android/build.gradle'):
            f=open('android/build.gradle'); c=f.read(); f.close()
            c=re.sub(r'ext\.kotlin_version\s*=\s*[\"\'][^\"\']+[\"\']', \"ext.kotlin_version = '2.0.21'\", c)
            f=open('android/build.gradle', 'w'); f.write(c); f.close()
        "

    - name: Copy AndroidManifest with Bluetooth permissions
      run: cp assets/android/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

    - name: Patch android/build.gradle for legacy plugins
      run: |
        echo -e "\next.flutter = [\n    compileSdkVersion: 36,\n    minSdkVersion: 21,\n    targetSdkVersion: 34\n]" >> android/build.gradle

    - name: Patch app-level build.gradle for JVM 17 and compileSdk 36
      run: |
        python3 -c "
        import os, re
        path = 'android/app/build.gradle'
        if os.path.exists(path):
            f=open(path); c=f.read(); f.close()
            c = c.replace('sourceCompatibility JavaVersion.VERSION_1_8', 'sourceCompatibility JavaVersion.VERSION_17')
            c = c.replace('targetCompatibility JavaVersion.VERSION_1_8', 'targetCompatibility JavaVersion.VERSION_17')
            c = c.replace(\"jvmTarget = '1.8'\", \"jvmTarget = '17'\")
            c = c.replace('jvmTarget = \"1.8\"', 'jvmTarget = \"17\"')
            c = re.sub(r'compileSdk\s*=?\s*\d+', 'compileSdk = 36', c)
            c = re.sub(r'compileSdkVersion\s*\d+', 'compileSdkVersion 36', c)
            f=open(path, 'w'); f.write(c); f.close()
        "

    - name: Get Dependencies
      run: flutter pub get

    - name: Generate Launcher Icons
      run: flutter pub run flutter_launcher_icons

    - name: Analyze Code
      run: flutter analyze --no-fatal-infos
      continue-on-error: true

    - name: Build APK
      run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-OBD-Assistant-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
