name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.3'
        channel: 'stable'

    - name: Recreate Platform Projects
      run: |
        flutter create . --org com.smart.obd --project-name smart_obd_assistant
        rm -rf test

    # ── Fix 1: Upgrade Kotlin to 2.2.0 to match kotlin-stdlib 2.2.20 ──────────
    - name: Patch Kotlin version to 2.2.0
      run: |
        python3 - <<'PYEOF'
        import os, re

        # settings.gradle  (new-style plugins block)
        p = 'android/settings.gradle'
        if os.path.exists(p):
            c = open(p).read()
            c = re.sub(
                r'(id\s+["\']org\.jetbrains\.kotlin\.android["\']\s+version\s+["\'])[^"\']+(["\'])',
                r'\g<1>2.2.0\2', c)
            open(p, 'w').write(c)
            print("settings.gradle patched:", c[:400])

        # build.gradle  (legacy ext.kotlin_version)
        p = 'android/build.gradle'
        if os.path.exists(p):
            c = open(p).read()
            c = re.sub(
                r"ext\.kotlin_version\s*=\s*['\"][^'\"]+['\"]",
                "ext.kotlin_version = '2.2.0'", c)
            open(p, 'w').write(c)
            print("build.gradle patched")
        PYEOF

    # ── Fix 2: Inject ext.flutter into android/build.gradle ───────────────────
    # flutter_blue_classic uses `flutter.compileSdkVersion` from the root project.
    # We must provide ext.flutter so all plugin subprojects can resolve it.
    - name: Inject ext.flutter into android/build.gradle
      run: |
        cat >> android/build.gradle << 'GROOVY'

        // Provide flutter SDK version constants for plugins like flutter_blue_classic
        ext.flutter = [
            compileSdkVersion: 36,
            minSdkVersion    : 24,
            targetSdkVersion : 34
        ]
        GROOVY
        echo "android/build.gradle after injection (last 20 lines):"
        tail -20 android/build.gradle

    # ── Fix 3: Force compileSdk 36 and minSdkVersion 24 in app/build.gradle ────
    # Flutter 3.24 uses `flutter.compileSdkVersion` (a variable), not a literal.
    # Replace variable reference AND any literal values.
    - name: Force compileSdk = 36 and minSdkVersion = 24 in app/build.gradle
      run: |
        python3 - <<'PYEOF'
        import os, re

        p = 'android/app/build.gradle'
        if not os.path.exists(p):
            print("app/build.gradle not found, skipping")
            exit(0)

        c = open(p).read()

        # 1. Replace any literal compileSdk / compileSdkVersion numbers
        c = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 36', c)
        c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', c)
        c = re.sub(r'minSdkVersion\s*=\s*\d+', 'minSdkVersion = 24', c)
        c = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 24', c)

        # 2. Replace flutter variables
        c = c.replace('flutter.compileSdkVersion', '36')
        c = c.replace('flutter.minSdkVersion', '24')

        # 3. JVM target upgrade
        c = c.replace('sourceCompatibility JavaVersion.VERSION_1_8',
                       'sourceCompatibility JavaVersion.VERSION_17')
        c = c.replace('targetCompatibility JavaVersion.VERSION_1_8',
                       'targetCompatibility JavaVersion.VERSION_17')
        c = c.replace("jvmTarget = '1.8'", "jvmTarget = '17'")
        c = c.replace('jvmTarget = "1.8"',  'jvmTarget = "17"')

        open(p, 'w').write(c)
        print("app/build.gradle patched successfully")
        print("=== First 600 chars ===")
        print(c[:600])
        PYEOF

    - name: Copy AndroidManifest with Bluetooth permissions
      run: cp assets/android/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

    - name: Get Dependencies
      run: flutter pub get

    - name: Generate Launcher Icons
      run: flutter pub run flutter_launcher_icons

    - name: Analyze Code
      run: flutter analyze --no-fatal-infos
      continue-on-error: true

    - name: Build APK
      run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-OBD-Assistant-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
