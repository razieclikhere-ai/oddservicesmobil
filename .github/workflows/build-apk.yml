name: Build Flutter Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Recreate Platform Projects
      run: flutter create . --org com.smart.obd --project-name smart_obd_assistant

    - name: Patch android/build.gradle for legacy plugins
      run: |
        echo -e "\next.flutter = [\n    compileSdkVersion: 34,\n    minSdkVersion: 21,\n    targetSdkVersion: 34\n]" >> android/build.gradle

    - name: Get Dependencies
      run: flutter pub get

    - name: Analyze Code
      run: flutter analyze --no-fatal-infos
      continue-on-error: true

    - name: Build APK
      run: flutter build apk --release --dart-define=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-OBD-Assistant-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
