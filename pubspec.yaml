name: smart_obd_assistant
description: "Smart OBD Service Assistant - AI-powered vehicle diagnostics and maintenance"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^13.2.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20

  # Cloud Backend (Supabase)
  supabase_flutter: ^2.3.4

  # OBD-II Connectivity
  flutter_blue_plus: ^2.3.8
  permission_handler: ^11.3.1
  usb_serial: ^0.5.2

  # Network
  http: ^1.2.1
  dio: ^5.4.3+1

  # Charts
  fl_chart: ^0.68.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3

  # QR Code
  qr_flutter: ^4.1.0

  # Image & File Handling
  image_picker: ^1.1.1
  file_picker: ^8.0.3
  open_filex: ^4.4.0

  # Crypto & Security
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # UI Enhancements
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Automotive Icons
  font_awesome_flutter: ^10.7.0

  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/data/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700