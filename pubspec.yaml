name: smart_obd_assistant
description: "Chek Mobilku - AI-powered vehicle diagnostics and maintenance"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.0

  # Database (SQLite local)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # OBD-II Connectivity (Bluetooth Classic)
  flutter_blue_classic: 0.1.0
  permission_handler: ^11.3.1

  # Network & AI (Groq)
  dio: ^5.4.3+1
  http: ^1.2.1

  # Charts
  fl_chart: ^0.68.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3

  # QR Code
  qr_flutter: ^4.1.0

  # UI Enhancements
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Automotive Icons
  font_awesome_flutter: 10.7.0
  flutter_tts: ^4.2.5

  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0C1017"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21